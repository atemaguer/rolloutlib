name: Deploy documentation

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install documentation dependencies
        run: uv sync --locked --group docs

      - name: Build documentation
        run: uv run mkdocs build --strict

      - name: Stamp documentation revision
        env:
          DOCS_REVISION: ${{ github.sha }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          revision = os.environ["DOCS_REVISION"]
          placeholder = "__ROLLOUTLIB_DOCS_REVISION__"
          site = Path("site")

          pages = tuple(site.rglob("*.html"))
          for page in pages:
              content = page.read_text()
              page.write_text(content.replace(placeholder, revision))

          (site / "revision.json").write_text(
              json.dumps({"revision": revision}) + "\n"
          )
          PY

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site/

  deploy:
    needs: build
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
