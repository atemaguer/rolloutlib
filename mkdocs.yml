site_name: rolloutlib
site_description: Gymnasium-native infrastructure for agentic RL post-training.
site_url: https://atemaguer.github.io/rolloutlib/
repo_url: https://github.com/atemaguer/rolloutlib
repo_name: atemaguer/rolloutlib

theme:
  name: material
  custom_dir: overrides
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - search.suggest
    - search.highlight
  font: false

extra_javascript:
  - javascripts/version-check.js

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            members_order: source
            show_root_heading: true
            show_source: true
            merge_init_into_class: true
            separate_signature: true

markdown_extensions:
  - admonition
  - attr_list
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - Integrations:
      - FinRL trading agents: integrations/finrl.md
  - Concepts:
      - Environments: concepts/environments.md
      - Spaces: concepts/spaces.md
      - Policies: concepts/rollouts.md
      - Graders:
          - Overview: concepts/graders.md
          - Rubrics and rubric graders: graders/rubrics.md
          - Reward graders: graders/reward-graders.md
          - Composite graders: graders/composite-graders.md
          - Scores and aggregation: graders/scores-and-aggregation.md
          - Representative examples: graders/examples.md
      - Evaluations: concepts/evaluations.md
  - API reference: api.md
